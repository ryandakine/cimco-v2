version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cimco
      POSTGRES_PASSWORD: cimco
      POSTGRES_DB: cimco_v2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cimco"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
