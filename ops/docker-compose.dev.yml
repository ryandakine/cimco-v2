version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-cimco}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-cimco_v2}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cimco}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cimco-dev-network

  backend:
    build:
      context: ../backend
      dockerfile: ../ops/Dockerfile.backend
    environment:
      DATABASE_URL: postgres://${DB_USER:-cimco}:${DB_PASSWORD:-dev_password}@postgres/${DB_NAME:-cimco_v2}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      RUST_LOG: debug
      PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      - ../backend/src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cimco-dev-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../ops/Dockerfile.frontend
    ports:
      - "3000:80"
    volumes:
      - ../frontend/src:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cimco-dev-network

volumes:
  postgres_dev_data:

networks:
  cimco-dev-network:
    driver: bridge
