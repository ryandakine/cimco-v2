global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cimco-backend'
    static_configs:
      - targets: ['backend:8081']
    metrics_path: '/api/metrics'
    scrape_interval: 30s
